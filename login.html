<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RINJANI4D — Admin Login</title>

    <!-- Supabase SDK v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <link href="https://images.linkcdn.cloud/V2/507/favicon/favicon-1888287302.png" rel="icon" type="image/png"/>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Barlow', sans-serif; }
        body {
            background: #000 url('https://i.imgur.com/zGbaikU.jpeg') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        body::before {
            content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.75); z-index: 1;
        }
        .login-card {
            background: rgba(17, 17, 17, 0.95);
            border: 1px solid #ffd700;
            border-radius: 12px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            z-index: 2;
            box-shadow: 0 4px 20px rgba(255,215,0,0.2);
            text-align: center;
        }
        .logo img { height: 45px; margin-bottom: 25px; }
        h2 { color: #ffd700; margin-bottom: 25px; font-size: 22px; font-weight: 700; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { color: #ccc; display: block; margin-bottom: 8px; font-size: 14px; }
        input {
            width: 100%; padding: 12px; background: #222; border: 1px solid #444;
            color: #fff; border-radius: 6px; font-size: 14px; transition: 0.3s;
        }
        input:focus { border-color: #ffd700; outline: none; }
        button {
            width: 100%; padding: 12px; background: #ffd700; color: #000;
            border: none; border-radius: 6px; font-weight: 700; font-size: 15px;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        button:hover { background: #fff; }
        .error-msg { color: #fc8181; font-size: 13px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">
        <img src="https://i.imgur.com/DuwlIfJ.png" alt="Logo">
    </div>
    <h2>PANEL KONTROL ADMIN</h2>

    <form id="loginForm">
        <div class="form-group">
            <label>Email Admin</label>
            <input type="email" id="email" placeholder="admin@rinjani4d.com" required autocomplete="username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" id="btnLogin">MASUK PANEL</button>
        <div class="error-msg" id="errorMsg">Email atau password salah!</div>
    </form>
</div>

<script>
    // ═══════════════════════════════════════════════════════
    // SUPABASE CLIENT — DIRECT (NO NETLIFY)
    // ═══════════════════════════════════════════════════════
    const { createClient } = supabase;
    const db = createClient(
        'https://bejygkgfpeuhphrrelmy.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJlanlna2dmcGV1aHBocnJlbG15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MzIwNTgsImV4cCI6MjA5NjIwODA1OH0.S8zDfyUu3tcmFeqZXkzj-nPkdW14zm-mLyYr3iBGvcM'
    );

    // ═══════════════════════════════════════════════════════
    // CEK SESI — jika sudah login langsung masuk admin
    // ═══════════════════════════════════════════════════════
    (async () => {
        const { data: { session } } = await db.auth.getSession();
        if (session) {
            window.location.href = 'admin.html';
        }
    })();

    // ═══════════════════════════════════════════════════════
    // FORM SUBMIT — LOGIN DENGAN SUPABASE AUTH
    // ═══════════════════════════════════════════════════════
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('btnLogin');
        const err      = document.getElementById('errorMsg');

        btn.disabled    = true;
        btn.textContent = 'Memverifikasi...';
        err.style.display = 'none';

        try {
            const { data, error } = await db.auth.signInWithPassword({ email, password });

            if (error) throw error;

            // Login sukses — sesi otomatis disimpan oleh Supabase SDK
            err.textContent      = '✅ Login Sukses! Mengalihkan...';
            err.style.color      = '#68d391';
            err.style.display    = 'block';

            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 1000);

        } catch (error) {
            // Terjemahkan pesan error umum Supabase ke bahasa Indonesia
            let pesanError = '❌ Gagal Masuk: ';
            if (error.message.includes('Invalid login credentials')) {
                pesanError += 'Email atau password salah!';
            } else if (error.message.includes('Email not confirmed')) {
                pesanError += 'Email belum dikonfirmasi. Cek inbox Anda.';
            } else if (error.message.includes('Too many requests')) {
                pesanError += 'Terlalu banyak percobaan. Coba lagi nanti.';
            } else {
                pesanError += error.message;
            }

            err.textContent   = pesanError;
            err.style.color   = '#fc8181';
            err.style.display = 'block';
            btn.disabled      = false;
            btn.textContent   = 'MASUK PANEL';
        }
    });
</script>

</body>
</html>
